<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ardentious - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS variables for easy theme management */
        :root {
            --background-color: #121212;
            --text-color: #E0E0E0;
            --glow-color: #00BFFF; /* DeepSkyBlue for a vibrant glow */
            --animation-duration: 4s;
        }

        /* Basic setup for a full-screen, dark-themed layout */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif; /* A futuristic, tech-style font */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        /* Container to set up the 3D perspective for the spinning letters */
        .container {
            perspective: 800px;
        }

        /* Styling for the main title "ardentious" */
        .title {
            font-size: clamp(2.5rem, 10vw, 6rem); /* Responsive font size */
            font-weight: 700;
            letter-spacing: 0.5rem;
            text-transform: lowercase;
            cursor: default;
            user-select: none;
        }

        /* Each letter is a span to be animated individually */
        .title span {
            display: inline-block;
            animation: spin var(--animation-duration) infinite linear;
            text-shadow:
                0 0 5px var(--text-color),
                0 0 10px var(--glow-color),
                0 0 20px var(--glow-color),
                0 0 40px var(--glow-color);
            transition: all 0.3s ease;
        }

        /* Stagger the animation start time for each letter to create a wave effect */
        .title span:nth-child(1) { animation-delay: 0.0s; }
        .title span:nth-child(2) { animation-delay: 0.1s; }
        .title span:nth-child(3) { animation-delay: 0.2s; }
        .title span:nth-child(4) { animation-delay: 0.3s; }
        .title span:nth-child(5) { animation-delay: 0.4s; }
        .title span:nth-child(6) { animation-delay: 0.5s; }
        .title span:nth-child(7) { animation-delay: 0.6s; }
        .title span:nth-child(8) { animation-delay: 0.7s; }
        .title span:nth-child(9) { animation-delay: 0.8s; }
        .title span:nth-child(10) { animation-delay: 0.9s; }

        /* The keyframe animation for the 3D spin effect */
        @keyframes spin {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        /* Styling for the "COMING SOON" subtitle */
        .subtitle {
            margin-top: 1rem;
            font-size: clamp(1rem, 4vw, 1.5rem); /* Responsive font size */
            font-weight: 400;
            letter-spacing: 0.2rem;
            opacity: 0; /* Start invisible for the fade-in effect */
            animation: fadeIn 3s ease-in-out forwards; /* 'forwards' keeps it visible after animation */
            animation-delay: 0.5s; /* Delay the fade-in slightly */
        }

        /* Simple fade-in animation for the subtitle */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title" aria-label="ardentious">
            <!-- Each letter is in a span for individual animation control -->
            <span>a</span><span>r</span><span>d</span><span>e</span><span>n</span><span>t</span><span>i</span><span>o</span><span>u</span><span>s</span>
        </h1>
        <p class="subtitle">COMING SOON</p>
    </div>

</body>
</html>
