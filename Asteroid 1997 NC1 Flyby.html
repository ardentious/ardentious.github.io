<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid 1997 NC1 Flyby</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }
        canvas { 
            display: block; 
        }
        
        /* UI Styling */
        #ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 500px;
            background: rgba(8, 12, 20, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            pointer-events: auto;
            user-select: none;
            z-index: 100;
        }
        .header-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8ab4f8;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .date-display {
            font-size: 26px;
            font-weight: 200;
            margin: 0 0 6px 0;
            letter-spacing: 1px;
            /* Guarantees digits take up uniform width and stops any wrapping */
            font-variant-numeric: tabular-nums; 
            white-space: nowrap; 
        }
        .status-display {
            font-size: 13px;
            color: #aebfd4;
            font-weight: 300;
            margin-bottom: 24px;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        
        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
            padding: 10px 0;
            cursor: pointer;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px 3px rgba(138, 180, 248, 0.7);
            margin-top: -8px;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 10px;
            color: #708090;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: monospace;
            letter-spacing: 3px;
            font-size: 14px;
            transition: opacity 1s;
        }
    </style>
</head>
<body>
    <div id="loading">INITIALIZING VISUAL TELEMETRY...</div>
    
    <div id="ui-container" style="opacity: 0; transition: opacity 2s ease-in;">
        <div class="header-text">ASTEROID 1997 NC1</div>
        <!-- Default text updated to match the new 24hr tabular format -->
        <div class="date-display" id="dateDisplay">JUN 25, 2026 - 11:14 UTC</div>
        <div class="status-display" id="statusDisplay">APPROACHING EARTH</div>
        <input type="range" id="timeSlider" min="0" max="1000" value="0">
        <div class="labels">
            <span>Incoming</span>
            <span>Closest Pass</span>
            <span>Outgoing</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        window.onload = function() {
            initScene();
            
            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('ui-container').style.opacity = 1;
            }, 800);
        };

        let scene, camera, renderer;
        let asteroidGroup, asteroidMesh, debrisField;
        let earthGroup, earthMesh, atmMesh;
        
        let isUserInteracting = false;
        let targetT = 0.0;
        let currentT = 0.0;
        
        const startMs = new Date("2026-06-25T11:14:00Z").getTime();
        const endMs = new Date("2026-06-29T11:14:00Z").getTime();
        
        const pathMid = new THREE.Vector3(35, 0, 0); 
        const pathDelta = new THREE.Vector3(140, -20, 200);
        const startPos = pathMid.clone().sub(pathDelta);
        const endPos = pathMid.clone().add(pathDelta);

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0015);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x0c1220, 1.2); 
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfff5e6, 3.5); 
            sunLight.position.set(250, 60, -120);
            scene.add(sunLight);

            const earthLight = new THREE.PointLight(0x4a90e2, 3.0, 300);
            earthLight.position.set(0, 0, 0); 
            scene.add(earthLight);

            createProceduralEarth(sunLight.position);
            createAsteroid();
            createStarfield();
            createSunFlare(sunLight.position);

            window.addEventListener('resize', onWindowResize);

            const slider = document.getElementById('timeSlider');
            slider.addEventListener('input', (e) => {
                isUserInteracting = true;
                targetT = e.target.value / 1000;
            });
            ['mousedown', 'touchstart'].forEach(evt => 
                slider.addEventListener(evt, () => isUserInteracting = true)
            );
            ['mouseup', 'touchend', 'mouseleave'].forEach(evt => 
                slider.addEventListener(evt, () => isUserInteracting = false)
            );

            animate();
        }

        function createProceduralEarth(sunPos) {
            earthGroup = new THREE.Group();
            earthGroup.rotation.z = 0.41; 
            scene.add(earthGroup);

            const earthVert = `
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec3 vLocalPosition;
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                    vLocalPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            const earthFrag = `
                uniform vec3 sunDirection;
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec3 vLocalPosition;

                float hash(float n) { return fract(sin(n) * 1e4); }
                float noise(vec3 x) {
                    const vec3 step = vec3(110.0, 241.0, 171.0);
                    vec3 i = floor(x);
                    vec3 f = fract(x);
                    float n = dot(i, step);
                    vec3 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(mix( hash(n + dot(step, vec3(0, 0, 0))), hash(n + dot(step, vec3(1, 0, 0))), u.x),
                                   mix( hash(n + dot(step, vec3(0, 1, 0))), hash(n + dot(step, vec3(1, 1, 0))), u.x), u.y),
                               mix(mix( hash(n + dot(step, vec3(0, 0, 1))), hash(n + dot(step, vec3(1, 0, 1))), u.x),
                                   mix( hash(n + dot(step, vec3(0, 1, 1))), hash(n + dot(step, vec3(1, 1, 1))), u.x), u.y), u.z);
                }
                float fbm(vec3 p) {
                    float f = 0.0;
                    float w = 0.5;
                    for(int i=0; i<5; i++) {
                        f += w * noise(p);
                        p *= 2.01;
                        w *= 0.5;
                    }
                    return f;
                }

                void main() {
                    vec3 nSphere = normalize(vLocalPosition);
                    
                    float nLand = fbm(nSphere * 2.5);
                    float isLand = smoothstep(0.46, 0.54, nLand);
                    
                    vec3 ocean = vec3(0.01, 0.04, 0.12);
                    vec3 shallow = vec3(0.04, 0.15, 0.25);
                    vec3 water = mix(ocean, shallow, smoothstep(0.3, 0.46, nLand));
                    
                    vec3 forest = vec3(0.04, 0.12, 0.05);
                    vec3 desert = vec3(0.35, 0.25, 0.15);
                    float biome = fbm(nSphere * 4.0 + vec3(10.0));
                    vec3 landColor = mix(forest, desert, smoothstep(0.3, 0.7, biome));
                    
                    float lat = abs(nSphere.y);
                    landColor = mix(landColor, vec3(0.85, 0.9, 0.95), smoothstep(0.72, 0.88, lat + nLand*0.1));
                    
                    vec3 albedo = mix(water, landColor, isLand);
                    
                    float nCloud = fbm(nSphere * 3.5 + vec3(100.0));
                    float clouds = smoothstep(0.42, 0.75, nCloud);
                    albedo = mix(albedo, vec3(0.9, 0.9, 0.92), clouds * 0.95);
                    
                    vec3 normal = normalize(vNormal);
                    vec3 lightDir = normalize(sunDirection);
                    float diff = max(dot(normal, lightDir), 0.0);
                    
                    float terminator = smoothstep(-0.15, 0.1, dot(normal, lightDir));
                    float nightMask = 1.0 - terminator;
                    float nCity = fbm(nSphere * 35.0);
                    float cities = smoothstep(0.65, 0.9, nCity) * isLand * (1.0 - clouds);
                    vec3 cityColor = vec3(1.0, 0.8, 0.4) * cities * nightMask * 4.0;
                    
                    vec3 finalColor = albedo * diff * vec3(1.1, 1.0, 0.95) + cityColor;
                    
                    vec3 viewDir = normalize(-vPosition);
                    float rim = 1.0 - max(dot(viewDir, normal), 0.0);
                    float atm = smoothstep(0.6, 1.0, rim);
                    vec3 atmGlow = vec3(0.1, 0.4, 0.9) * atm * max(dot(normal, lightDir) + 0.3, 0.0);
                    
                    finalColor += atmGlow;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            const earthGeo = new THREE.SphereGeometry(20, 128, 128);
            const earthMat = new THREE.ShaderMaterial({
                uniforms: { sunDirection: { value: sunPos.clone().normalize() } },
                vertexShader: earthVert,
                fragmentShader: earthFrag
            });
            earthMesh = new THREE.Mesh(earthGeo, earthMat);
            earthGroup.add(earthMesh);

            const atmVert = `
                varying vec3 vNormal;
                varying vec3 vPosition;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            const atmFrag = `
                uniform vec3 sunDirection;
                varying vec3 vNormal;
                varying vec3 vPosition;
                void main() {
                    vec3 normal = normalize(vNormal);
                    vec3 viewDir = normalize(-vPosition);
                    vec3 lightDir = normalize(sunDirection);
                    
                    float rim = smoothstep(0.0, 1.0, 1.0 - dot(normal, viewDir));
                    float phase = smoothstep(-0.3, 0.5, dot(normal, lightDir));
                    
                    float alpha = pow(rim, 3.5) * phase * 0.7;
                    gl_FragColor = vec4(0.25, 0.5, 1.0, alpha);
                }
            `;
            const atmGeo = new THREE.SphereGeometry(20.5, 64, 64);
            const atmMaterial = new THREE.ShaderMaterial({
                uniforms: { sunDirection: { value: sunPos.clone().normalize() } },
                vertexShader: atmVert,
                fragmentShader: atmFrag,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            atmMesh = new THREE.Mesh(atmGeo, atmMaterial);
            earthGroup.add(atmMesh);
        }

        function createAsteroid() {
            asteroidGroup = new THREE.Group();
            scene.add(asteroidGroup);

            const astGeo = new THREE.IcosahedronGeometry(2.5, 32); 
            const pos = astGeo.attributes.position;
            const v = new THREE.Vector3();
            for(let i=0; i<pos.count; i++) {
                v.fromBufferAttribute(pos, i);
                
                const nx = v.x * 0.9;
                const ny = v.y * 0.9;
                const nz = v.z * 0.9;
                let n = Math.sin(nx)*Math.cos(ny)*Math.sin(nz);
                n += 0.5 * Math.sin(nx*2.5)*Math.cos(ny*2.5)*Math.sin(nz*2.5);
                
                v.x *= 1.4;
                v.y *= 0.8;
                v.z *= 1.2;
                
                v.addScaledVector(v.normalize(), n * 0.9);
                pos.setXYZ(i, v.x, v.y, v.z);
            }
            astGeo.computeVertexNormals();

            const astMat = new THREE.MeshStandardMaterial({
                color: 0x1f1d1a,
                roughness: 0.95,
                metalness: 0.05,
                flatShading: true
            });
            asteroidMesh = new THREE.Mesh(astGeo, astMat);
            asteroidGroup.add(asteroidMesh);

            const debrisGeo = new THREE.BufferGeometry();
            const debrisCount = 3500;
            const dPos = new Float32Array(debrisCount * 3);
            const dSize = new Float32Array(debrisCount);
            
            for(let i=0; i<debrisCount; i++) {
                const r = 3.5 + Math.pow(Math.random(), 2.0) * 12.0; 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                dPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                dPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                dPos[i*3+2] = r * Math.cos(phi);
                
                dSize[i] = Math.random() * 0.04 + 0.01;
            }
            debrisGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
            debrisGeo.setAttribute('size', new THREE.BufferAttribute(dSize, 1));

            const debrisMat = new THREE.ShaderMaterial({
                uniforms: { color: { value: new THREE.Color(0x9a9a9a) } },
                vertexShader: `
                    attribute float size;
                    varying float vAlpha;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (400.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                        vAlpha = 1.0 - smoothstep(7.0, 15.0, length(position));
                    }
                `,
                fragmentShader: `
                    uniform vec3 color;
                    varying float vAlpha;
                    void main() {
                        float r = distance(gl_PointCoord, vec2(0.5));
                        if (r > 0.5) discard;
                        gl_FragColor = vec4(color, vAlpha * (0.5 - r) * 2.0);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            debrisField = new THREE.Points(debrisGeo, debrisMat);
            asteroidGroup.add(debrisField);
        }

        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 6000;
            const starPos = new Float32Array(starCount * 3);
            const starColor = new Float32Array(starCount * 3);
            
            for(let i=0; i<starCount; i++) {
                starPos[i*3] = (Math.random() - 0.5) * 2500;
                starPos[i*3+1] = (Math.random() - 0.5) * 2500;
                starPos[i*3+2] = (Math.random() - 0.5) * 2500;
                
                const tColor = new THREE.Color();
                tColor.setHSL(Math.random() * 0.1 + 0.55, 0.8, Math.random() * 0.5 + 0.4);
                if(Math.random() > 0.85) tColor.setHSL(0.1, 0.8, 0.8); 
                
                starColor[i*3] = tColor.r;
                starColor[i*3+1] = tColor.g;
                starColor[i*3+2] = tColor.b;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColor, 3));
            
            const starMat = new THREE.PointsMaterial({ 
                size: 1.2, 
                vertexColors: true, 
                sizeAttenuation: false, 
                transparent: true, 
                opacity: 0.8 
            });
            scene.add(new THREE.Points(starGeo, starMat));
        }

        function createSunFlare(pos) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.1, 'rgba(255, 240, 210, 0.8)');
            grad.addColorStop(0.4, 'rgba(255, 180, 100, 0.15)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);
            
            const sunTex = new THREE.CanvasTexture(canvas);
            const sunMat = new THREE.SpriteMaterial({ 
                map: sunTex, 
                blending: THREE.AdditiveBlending, 
                depthWrite: false 
            });
            const sunSprite = new THREE.Sprite(sunMat);
            sunSprite.scale.set(400, 400, 1);
            sunSprite.position.copy(pos);
            scene.add(sunSprite);
        }

        function formatDisplayDate(dateObj) {
            const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            const month = months[dateObj.getUTCMonth()];
            
            // Pad day, hours, and minutes with leading zeroes to ensure fixed string length
            const day = dateObj.getUTCDate().toString().padStart(2, '0');
            const year = dateObj.getUTCFullYear();
            const hrs = dateObj.getUTCHours().toString().padStart(2, '0');
            const mins = dateObj.getUTCMinutes().toString().padStart(2, '0');
            
            // Format: JUN 25, 2026 - 09:14 UTC
            return `${month} ${day}, ${year} - ${hrs}:${mins} UTC`;
        }

        function updateScene(t) {
            const currentMs = startMs + t * (endMs - startMs);
            const dateObj = new Date(currentMs);
            document.getElementById('dateDisplay').innerText = formatDisplayDate(dateObj);
            
            let statusEl = document.getElementById('statusDisplay');
            if(t < 0.45) {
                statusEl.innerText = "APPROACHING EARTH";
                statusEl.style.color = "#aebfd4";
            } else if (t >= 0.45 && t <= 0.55) {
                statusEl.innerText = "CLOSEST APPROACH (~6.6 LUNAR DISTANCES)";
                statusEl.style.color = "#ffb067"; 
            } else {
                statusEl.innerText = "LEAVING EARTH";
                statusEl.style.color = "#aebfd4";
            }

            asteroidGroup.position.copy(startPos).lerp(endPos, t);
            
            const earthPos = new THREE.Vector3(0,0,0);
            const dirToEarth = earthPos.clone().sub(asteroidGroup.position).normalize();
            
            const right = new THREE.Vector3(0, 1, 0).cross(dirToEarth).normalize();
            const up = dirToEarth.clone().cross(right).normalize();
            
            const camDist = 9.0 + Math.sin(t * Math.PI) * 2.5; 
            
            camera.position.copy(asteroidGroup.position)
                .add(dirToEarth.clone().multiplyScalar(-camDist))
                .add(right.multiplyScalar(3.0)) 
                .add(up.multiplyScalar(1.5));   
                
            camera.lookAt(earthPos);

            earthMesh.rotation.y = t * Math.PI * 6; 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(!isUserInteracting) {
                targetT += 0.00015; 
                if(targetT > 1) targetT = 0; 
                document.getElementById('timeSlider').value = targetT * 1000;
            }
            
            currentT += (targetT - currentT) * 0.08;
            updateScene(currentT);
            
            asteroidMesh.rotation.x += 0.0008;
            asteroidMesh.rotation.y += 0.0015;
            
            debrisField.rotation.y -= 0.0004;
            debrisField.rotation.z += 0.0007;
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
